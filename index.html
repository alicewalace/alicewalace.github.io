<!DOCTYPE html>
<html>
<head>
    <title>Alice's Blog</title>
    <style>
        /* This is where the magic happens! Customize your colors below */
        body {
            background-color: #C79C93; /* Changes the background color */
            color: #611F14;            /* Changes the text color */
            font-family: 'Courier New', Courier, monospace; /* Changes the font */
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #611F14;            /* Custom color for your name (Hot Pink!) */
            font-size: 3rem;
            border-bottom: 3px dashed #ffb6c1; /* Fun decorative dashed line */
            padding-bottom: 10px;
        }

        .box {
            background-color: white;
            border: 2px solid #ff69b4;
            border-radius: 15px;      /* Rounds the corners */
            padding: 20px;
            margin-top: 20px;
            box-shadow: 5px 5px 0px #ffb6c1; /* Fun retro shadow effect */
        }
    </style>
</head>
<body>

    <h1>alicewalace ✨</h1>
    
    <div class="box">
        <p>I like cats. 🐾</p>
    </div>

</body>
</html>
